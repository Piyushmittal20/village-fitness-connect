kind = "web"
previewPath = "/"
title = "Rural Fitness Platform"
version = "1.0.0"
id = "artifacts/rural-fitness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23970

[services.development]
run = "pnpm --filter @workspace/rural-fitness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rural-fitness", "run", "build" ]
publicDir = "artifacts/rural-fitness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23970"
BASE_PATH = "/"
